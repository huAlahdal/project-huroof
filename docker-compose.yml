version: '3.8'

services:
  huroof-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: huroof-backend
    ports:
      - "5062:5062"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5062
    volumes:
      - ./backend/Data:/app/Data
    restart: unless-stopped
    networks:
      - huroof-network

  huroof-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: huroof-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5062
    depends_on:
      - huroof-backend
    restart: unless-stopped
    networks:
      - huroof-network

networks:
  huroof-network:
    driver: bridge

volumes:
  huroof-data:
    driver: local
